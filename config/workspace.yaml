project:
  name: "ShopEase Web App"
  description: "Living demo workspace for ShopEase e-commerce QA"
  access: none          # private

custom_fields:
  - name: "Component"
    type: selectbox
    options: [Web UI, Backend API, Payments, Search, Admin]
  - name: "User Journey"
    type: selectbox
    options: [New user, Returning user, Guest, Admin]
  - name: "Risk"
    type: selectbox
    options: [High, Medium, Low]
  - name: "Automation Track"
    type: selectbox
    options: [Not automated, Candidate, Automated]
  - name: "Test Data Profile"
    type: multiselect
    options: [US address, EU address, Out-of-stock, Discount eligible, 3DS required]

milestones:
  - title: "Sprint 1 – Foundation"
  - title: "Sprint 2 – Cart & Checkout"
  - title: "Sprint 3 – Orders & Admin"

environments:
  - title: Staging
    slug: staging
    host: https://staging.shopease.example.com
  - title: Production
    slug: production
    host: https://www.shopease.example.com
  - title: Development
    slug: dev
    host: http://localhost:3000
  - title: QA
    slug: qa
    host: https://qa.shopease.example.com
  - title: UAT
    slug: uat
    host: https://uat.shopease.example.com
  - title: Performance
    slug: perf
    host: https://perf.shopease.example.com

configurations:
  - group: Browser
    items: [Chrome, Firefox, Safari, Edge]
  - group: Device
    items: [Desktop, Mobile, Tablet]
  - group: OS
    items: [Windows, MacOS, Linux, Android, iOS]
  - group: Network
    items: [WiFi, 5G, 4G, Offline]

shared_steps:
  # 50 unique titles — step content is generated in scripts/workspace_init.py
  # cycling three patterns: A (flat), B (2 levels deep), C (1 level deep)
  - "Log in with registered user credentials"
  - "Register new user account via email"
  - "Reset password using email verification link"
  - "Log out from all active sessions"
  - "Verify email address after registration"
  - "Attempt login with invalid credentials"
  - "Lock account after repeated failed login attempts"
  - "Update account password from profile settings"
  - "Search for a product by keyword"
  - "Filter search results by price range"
  - "Sort products by customer rating"
  - "Browse product category page"
  - "View product detail page"
  - "Apply multiple filters simultaneously"
  - "Handle zero-results search query"
  - "Navigate back from PDP to search results"
  - "Add product to cart from product listing"
  - "Add product to cart from PDP"
  - "Remove item from shopping cart"
  - "Update cart item quantity"
  - "Merge guest cart with registered user cart"
  - "Verify cart total with applicable tax"
  - "Apply promo code to cart"
  - "Validate cart item count badge"
  - "Proceed from cart to checkout"
  - "Enter and validate shipping address"
  - "Select shipping method and review estimated cost"
  - "Enter credit card payment details"
  - "Complete 3DS card authentication flow"
  - "Place order and review confirmation page"
  - "Complete guest checkout without account"
  - "Apply saved address at checkout"
  - "View order history and filter by status"
  - "View order detail and line items"
  - "Cancel an in-progress order"
  - "Track shipment status for a delivered order"
  - "Download order invoice as PDF"
  - "Reorder items from previous purchase"
  - "Initiate a product return request"
  - "Select return reason and upload supporting evidence"
  - "Submit return and receive confirmation number"
  - "Track refund status in order history"
  - "Process refund for a returned item in admin"
  - "Access admin dashboard and verify key metrics"
  - "Search for customer account by email in admin"
  - "Update order status in admin panel"
  - "Add new product to the catalog"
  - "Apply discount code to a customer order"
  - "Generate sales report for a custom date range"
  - "Suspend and reinstate a user account"

shared_parameters:
  - name: "TestUserEmail"
    value: "test@example.com"
  - name: "TestUserPassword"
    value: "SecurePass123"
  - name: "DefaultProductName"
    value: "ShopEase Widget"

# Maps CSV column names to canonical custom field names
cf_column_map:
  cf_6: "Component"
  cf_7: "User Journey"
  cf_8: "Risk"
  cf_9: "Automation Track"
  cf_10: "Test Data Profile"

# Maps top-level suite names to Jira epic slugs (for requirement linking)
suite_domain_map:
  "01 Authentication":   auth
  "02 Search & Browse":  search
  "03 Cart & Promotions": cart
  "04 Checkout":         checkout
  "05 Orders":           orders
  "06 Returns & Refunds": orders
  "07 Admin":            admin

seed:
  cases_csv: "assets/seed-data/QD-2026-02-18.csv"
  seed_value: 42

simulation:
  # Script 5 creates present-time runs only (Qase sets create timestamps to now)
  run_count: 20
  pass_rate_range: [0.85, 0.92]
  weak_suite: "04 Checkout"
  run_types: [Regression, Feature, Smoke]

maintenance:
  min_runs: 1
  max_runs: 6
  run_count_weights:
    "1": 0.30
    "2": 0.25
    "3": 0.20
    "4": 0.12
    "5": 0.08
    "6": 0.05
  weekdays_only: true
  schedule_timezone: "UTC"
